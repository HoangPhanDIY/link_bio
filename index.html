<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, "fetch", {
            get: function () {
              return currentFetch;
            },
            set: function (val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          console.warn("Could not patch window.fetch:", e);
        }
        try {
          var originalFetchGT = globalThis.fetch;
          var currentFetchGT = originalFetchGT;
          Object.defineProperty(globalThis, "fetch", {
            get: function () {
              return currentFetchGT;
            },
            set: function (val) {
              currentFetchGT = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          console.warn("Could not patch globalThis.fetch:", e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoàng Ao Nhây</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
